name: Build Hostinger Static Branch

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

concurrency:
  group: hostinger-static
  cancel-in-progress: false

jobs:
  build-static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: 1
          WORDPRESS_API_URL: ${{ vars.WORDPRESS_API_URL || 'https://neshise.com/cms/wp-json/wp/v2' }}

      - name: Publish hostinger-static branch
        run: |
          cd dist
          git init -b hostinger-static
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Build Hostinger static site"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" hostinger-static
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
